services:
  app:
    profiles: [run]
    image: "${IMAGE_NAME}:${IMAGE_TAG}"
#    platform: linux/amd64  # for pyflagser
    build:
      dockerfile: Dockerfile
      args:
      - ENVIRONMENT
      - APP_NAME
      - APP_VERSION
      - COMMIT_SHA
      - UV_INDEX_OBI_CODEARTIFACT_USERNAME
      - UV_INDEX_OBI_CODEARTIFACT_PASSWORD
      tags:
      - "${IMAGE_NAME}:${IMAGE_TAG_ALIAS}"
    ports:
    - "127.0.0.1:8100:8000"
    env_file: .env.run-docker
    develop:
      watch:
      - action: sync+restart
        path: ./app
        target: /code/app
      - action: rebuild
        path: uv.lock
